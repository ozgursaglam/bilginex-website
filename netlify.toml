[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://sibforms.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://sibforms.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://sibforms.com https://*.sibforms.com; frame-src 'none';"
